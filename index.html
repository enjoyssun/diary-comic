<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기 4컷 만화</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFDF4;      /* 크림색 도화지 */
    --ink:#4A4440;        /* 크레용 진갈색 */
    --crayon-red:#F0776B; /* 지붕 빨강 */
    --crayon-yellow:#FFD95C;
    --crayon-green:#8FC97F;
    --crayon-blue:#9CC8E8;
    --blush:#FFC9B8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Gaegu',cursive;color:var(--ink);
    background:var(--paper);
    min-height:100vh;padding:36px 16px 90px;font-size:1.15rem;
  }
  .wrap{max-width:640px;margin:0 auto}

  /* 삐뚤빼뚤 손그림 테두리 */
  .doodle{
    background:#fff;border:3px solid var(--ink);
    border-radius:255px 18px 225px 18px/18px 225px 18px 255px;
    box-shadow:4px 5px 0 rgba(74,68,64,.12);
  }

  header{ text-align:center; margin-bottom:26px; position:relative; }
  h1{
    font-weight:700;font-size:2.7rem;letter-spacing:.06em;display:inline-block;
    background:linear-gradient(transparent 58%,var(--crayon-yellow) 58%);
    padding:0 10px;transform:rotate(-1deg);
  }
  .deco{ font-size:1.5rem; position:absolute; }
  .deco.sun{ right:8%; top:-6px; transform:rotate(12deg); }
  .deco.cloud{ left:6%; top:4px; transform:rotate(-6deg); }
  .sub{ margin-top:8px; color:#8d857e; font-size:1.05rem; }

  /* 그림일기 상단: 날짜 + 날씨 */
  .diary-head{ display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .date-box,.weather-box{ padding:10px 16px; }
  .date-box{ flex:1; min-width:180px; display:flex; align-items:center; gap:8px; }
  .weather-box{ flex:2; min-width:260px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .label-mini{ font-weight:700; }
  .w-btn{
    font-family:inherit; font-size:1.5rem; line-height:1;
    background:transparent; border:3px solid transparent; border-radius:50%;
    padding:6px 8px; cursor:pointer; transition:transform .08s;
  }
  .w-btn:hover{ transform:scale(1.15) rotate(-6deg); }
  .w-btn.on{
    border-color:var(--ink);
    background:var(--crayon-yellow);
    border-radius:255px 18px 225px 18px/18px 225px 18px 255px;
  }

  .card{ padding:20px; margin-bottom:18px; }
  label{ font-size:1.3rem; font-weight:700; display:block; margin-bottom:8px; }
  textarea{
    width:100%; border:3px dashed var(--ink); border-radius:14px;
    background:var(--paper);
    font-family:'Gaegu',cursive; font-size:1.2rem; padding:12px; color:var(--ink);
    min-height:150px; resize:vertical; line-height:1.9;
  }
  textarea:focus{ outline:3px solid var(--crayon-yellow); }

  button#go{
    font-family:inherit; font-size:1.5rem; font-weight:700; cursor:pointer;
    background:var(--crayon-red); color:#fff;
    border:3px solid var(--ink);
    border-radius:255px 18px 225px 18px/18px 225px 18px 255px;
    padding:12px 34px; box-shadow:4px 4px 0 var(--ink);
    transition:transform .06s;
  }
  button#go:hover{ transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink); }
  button#go:disabled{ opacity:.55; cursor:wait; transform:none; }

  #status{ white-space:pre-wrap; font-size:1.15rem; margin:16px 0; min-height:1.4em; }
  #status.err{ color:var(--crayon-red); }

  /* 완성작: 도화지에 테이프로 붙인 느낌 */
  #result{ display:none; text-align:center; margin-top:30px; }
  #result.show{ display:block; }
  .tape{
    display:inline-block; position:relative; background:#fff; padding:14px;
    border:3px solid var(--ink);
    border-radius:18px 255px 18px 225px/225px 18px 255px 18px;
    transform:rotate(-1.2deg);
    box-shadow:6px 8px 16px rgba(74,68,64,.18);
  }
  .tape::before{
    content:""; position:absolute; top:-15px; left:50%; transform:translateX(-50%) rotate(2deg);
    width:110px; height:30px; background:rgba(255,217,92,.8);
    border-left:2px dashed rgba(74,68,64,.35); border-right:2px dashed rgba(74,68,64,.35);
  }
  #comicCanvas{ max-width:100%; height:auto; display:block; border-radius:8px; }
  #title{ font-size:1.7rem; margin:16px 0 4px; }
  button#dl{
    font-family:inherit; font-size:1.2rem; font-weight:700; cursor:pointer;
    background:var(--crayon-green); color:#fff; border:3px solid var(--ink);
    border-radius:255px 18px 225px 18px/18px 225px 18px 255px;
    padding:8px 22px; box-shadow:3px 3px 0 var(--ink); margin-top:14px;
  }

  /* 잔디 발치 장식 */
  .grass{
    position:fixed; left:0; right:0; bottom:0; height:34px; pointer-events:none;
    background:var(--crayon-green);
    border-top:3px solid var(--ink);
    border-radius:60% 40% 0 0/100% 80% 0 0;
    opacity:.9;
  }
  footer{ margin-top:44px; text-align:center; color:#a39a92; font-size:.95rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="deco cloud">☁️</span>
    <h1>나의 그림일기</h1>
    <span class="deco sun">🌞</span>
    <p class="sub">오늘 있었던 일을 쓰면, 4컷 만화로 그려드려요.</p>
  </header>

  <div class="diary-head">
    <div class="date-box doodle">
      <span class="label-mini">📅 날짜:</span><span id="today"></span>
    </div>
    <div class="weather-box doodle">
      <span class="label-mini">날씨:</span>
      <button class="w-btn on" data-w="맑음">☀️</button>
      <button class="w-btn" data-w="구름">☁️</button>
      <button class="w-btn" data-w="비">🌧️</button>
      <button class="w-btn" data-w="눈">❄️</button>
      <button class="w-btn" data-w="바람">🍃</button>
    </div>
  </div>

  <div class="card doodle">
    <label for="diary">✏️ 오늘의 일기</label>
    <textarea id="diary" placeholder="오늘은 이런 일이 있었다..."></textarea>
  </div>

  <button id="go">만화 만들기 ✨</button>
  <p id="status"></p>

  <div id="result">
    <div class="tape"><canvas id="comicCanvas" width="1576" height="1576"></canvas></div>
    <p id="title"></p>
    <button id="dl">그림 저장하기 💾</button>
  </div>

  <footer>스타일 참고 그림: <code>style/1.png ~ 3.png</code> 를 저장소에 넣으면 내 그림체로 그려요.</footer>
</div>
<div class="grass"></div>

<script>
/* ─── 설정: 내 그림체 샘플 (저장소의 style 폴더에 넣기) ─── */
const STYLE_IMAGES = ["style/1.png","style/2.png","style/3.png"]; // 없으면 자동으로 건너뜀
// 구글 심부름꾼 (Apps Script) — 구글 서버에서 실행되어 지역 제한이 없어요
const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbx2DIOX_BSKieWPtRJmPThi9PKaV0MeTjjhfW1w1QN438qxT-vtqWAUMsR9xhRzSSnW/exec";
// 위에서부터 차례로 시도 → 안 되면 자동으로 다음 모델로 넘어가요
const TEXT_MODELS  = ["gemini-3.5-flash","gemini-3-flash-preview","gemini-3.1-flash-lite","gemini-flash-latest","gemini-2.5-flash-lite"];
const IMAGE_MODELS = ["gemini-3.1-flash-image","gemini-3.1-flash-lite-image","gemini-2.5-flash-image"];
// 예비 화가(Pollinations)에게 알려줄 내 그림체 설명 (자유롭게 수정하세요!)
const STYLE_TEXT = "Korean cute doodle diary comic, drawn with soft wobbly pencil-crayon lines in warm dark gray. MAIN CHARACTER (must be IDENTICAL in every panel): a chubby round-faced girl with chin-length yellow bob hair flipping outward, bangs drawn as 3 small spiral loops on the forehead, two tiny black dot eyes set wide apart, no nose, tiny mouth (big oval open mouth only when surprised), 3 short diagonal blush lines on each cheek, almost no neck, small round body, mitten hands. COLORING RULE: rough yellow crayon fill ONLY on the hair, spilling slightly outside the lines; everything else stays uncolored white line-art. BACKGROUND: pure white, empty, no scenery — only tiny floating doodles like sweat drops, sparkles, hearts or yellow-highlighted exclamation marks to show emotion. Extremely simple childlike scribble, very few lines, lots of empty space. NOT detailed illustration, NOT anime, no shading, no gradients, no realistic anatomy";

/* 후보 모델을 순서대로 시도하는 공통 함수 */
async function tryModels(models, body){
  const report = [];
  for(const m of models){
    // Content-Type을 text/plain으로 보내면 브라우저 사전검사(CORS preflight) 없이 통과해요
    const r = await fetch(SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({model:m, body})
    });
    if(!r.ok){ report.push(`${m} → 심부름꾼 연결 실패 (${r.status})`); continue; }
    const wrap = await r.json(); // {status, body}
    if(wrap.status === 200) return JSON.parse(wrap.body);
    let brief = String(wrap.body).slice(0,80);
    try{ brief = JSON.parse(wrap.body).error.message.slice(0,80); }catch(e){}
    report.push(`${m} → ${wrap.status}: ${brief}`);
    if(![400,404,429,503].includes(wrap.status)) break;
  }
  throw new Error("\n" + report.join("\n"));
}

const $ = id => document.getElementById(id);

/* 오늘 날짜 표시 */
(()=>{
  const d = new Date();
  const days = ["일","월","화","수","목","금","토"];
  $("today").textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
})();

/* 날씨 선택 */
let weather = "맑음";
document.querySelectorAll(".w-btn").forEach(b=>{
  b.addEventListener("click", ()=>{
    document.querySelectorAll(".w-btn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    weather = b.dataset.w;
  });
});
const status = (msg, err=false) => { $("status").textContent = msg; $("status").className = err?"err":""; };

/* 스타일 샘플을 base64로 로드 (없으면 빈 배열) */
async function loadStyleRefs(){
  const refs = [];
  for(const path of STYLE_IMAGES){
    try{
      const r = await fetch(path);
      if(!r.ok) continue;
      const blob = await r.blob();
      const b64 = await new Promise(res=>{
        const fr = new FileReader();
        fr.onload = () => res(fr.result.split(",")[1]);
        fr.readAsDataURL(blob);
      });
      refs.push({inline_data:{mime_type:blob.type||"image/png", data:b64}});
    }catch(e){/* 파일 없음 → 무시 */}
  }
  return refs;
}

/* 1단계: 일기 → 4컷 콘티 JSON */
async function makeStoryboard(diary){
  const prompt = `당신은 4컷 만화 콘티 작가입니다. 아래 일기를 기승전결 4컷 콘티로 만드세요.
- 마지막 컷에 유머나 여운
- scene_en: 이미지 생성용 영어 장면 묘사. 주인공의 외모는 쓰지 말고(따로 처리됨) 행동/표정/소품만 구체적으로. 매 컷 같은 주인공
- dialog: 짧은 한국어 대사 (없으면 "")
반드시 JSON만 출력: {"title":"제목","panels":[{"scene_en":"...","dialog":"..."},...4개]}

일기: ${diary}`;
  const data = await tryModels(TEXT_MODELS, {contents:[{parts:[{text:prompt}]}]})
    .catch(e=>{ throw new Error(`콘티 생성 실패 ▶ ${e.message}`); });
  const text = data.candidates[0].content.parts.map(p=>p.text||"").join("");
  return JSON.parse(text.replace(/```(json)?/g,"").trim());
}

/* 2단계: 각 컷 이미지 생성 */
async function makePanel(scene, styleRefs, seed){
  // 1차: 구글 화가 (내 그림 샘플을 보고 그려요)
  try{
    const parts = [...styleRefs, {text:
      (styleRefs.length ? "Draw in EXACTLY the same art style as the reference images above, and the main character must look IDENTICAL to the girl in those references. " : "") +
      `${STYLE_TEXT}. Scene: ${scene}. Square composition, no text, no speech bubbles.`}];
    const data = await tryModels(IMAGE_MODELS, {contents:[{parts}], generationConfig:{responseModalities:["IMAGE"]}});
    const img = data.candidates[0].content.parts.find(p=>p.inline_data||p.inlineData);
    const d = img.inline_data || img.inlineData;
    return `data:${d.mime_type||d.mimeType};base64,${d.data}`;
  }catch(e){
    console.warn("구글 화가 불가, 예비 화가 투입:", e.message);
  }
  // 2차: 예비 화가 Pollinations (무료, 열쇠 불필요)
  const prompt = encodeURIComponent(`${STYLE_TEXT}. Scene: ${scene}. Square comic panel, white background, no text, no speech bubbles`);
  const pUrl = `https://image.pollinations.ai/prompt/${prompt}?width=768&height=768&nologo=true&seed=${seed}`;
  const r = await fetch(pUrl);
  if(!r.ok) throw new Error(`그림 생성 실패 ▶ 예비 화가도 응답하지 않아요 (${r.status}) — 잠시 후 다시 시도해주세요`);
  const blob = await r.blob();
  return await new Promise(res=>{
    const fr = new FileReader(); fr.onload = ()=>res(fr.result); fr.readAsDataURL(blob);
  });
}

/* 3단계: 캔버스에 2x2 합성 + 말풍선 */
async function compose(urls, sb){
  const S=768, M=12, cv=$("comicCanvas"), ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
  const pos=[[M,M],[S+M*2,M],[M,S+M*2],[S+M*2,S+M*2]];
  for(let i=0;i<4;i++){
    const img = await new Promise((res,rej)=>{
      const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=urls[i];
    });
    ctx.drawImage(img,pos[i][0],pos[i][1],S,S);
    ctx.strokeStyle="#2E3440"; ctx.lineWidth=3;
    ctx.strokeRect(pos[i][0],pos[i][1],S,S);
    const dialog=(sb.panels[i].dialog||"").trim();
    if(dialog){
      ctx.font="700 34px Gaegu, sans-serif";
      const w=ctx.measureText(dialog).width;
      const x=pos[i][0]+24, y=pos[i][1]+S-40;
      ctx.fillStyle="#fff";
      ctx.strokeStyle="#2E3440"; ctx.lineWidth=2.5;
      roundRect(ctx,x-12,y-34,w+24,50,10); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#2E3440"; ctx.fillText(dialog,x,y);
    }
  }
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* 실행 */
$("go").addEventListener("click", async ()=>{
  const diary=$("diary").value.trim();
  if(!diary) return status("일기를 먼저 써주세요! ✏️", true);
  $("go").disabled=true; $("result").classList.remove("show");
  try{
    status("내 그림체 샘플을 챙기는 중…");
    const refs = await loadStyleRefs();
    status("콘티를 짜는 중… 📝");
    const sb = await makeStoryboard(diary + `\n(오늘의 날씨: ${weather})`);
    const comicSeed = Math.floor(Math.random()*1000000); // 매번 다른 그림이 나오게
    const urls=[];
    for(let i=0;i<4;i++){
      status(`${i+1}번째 컷을 그리는 중… 🎨 (${i+1}/4)`);
      urls.push(await makePanel(sb.panels[i].scene_en, refs, comicSeed)); // 같은 시드 = 같은 화풍 유지
    }
    status("네 컷을 이어 붙이는 중… ✂️");
    await compose(urls, sb);
    $("title").textContent = "「 "+sb.title+" 」";
    $("result").classList.add("show");
    status("완성! 🎉");
  }catch(e){
    console.error(e);
    status(e.message || "문제가 생겼어요. 잠시 후 다시 시도해주세요.", true);
  }finally{
    $("go").disabled=false;
  }
});

$("dl").addEventListener("click", ()=>{
  const a=document.createElement("a");
  a.download="my-diary-comic.png";
  a.href=$("comicCanvas").toDataURL("image/png");
  a.click();
});
</script>
</body>
</html>
